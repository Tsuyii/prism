<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism — Post Review (Mobile)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #09090B; color: #fff; max-width: 390px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #27272A; }
    .back-btn { color: #71717A; font-size: 20px; background: none; border: none; cursor: pointer; }
    .header-title { font-size: 15px; font-weight: 600; }
    .type-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 999px; background: #2E1065; color: #C4B5FD; }
    .tabs { display: flex; border-bottom: 1px solid #27272A; }
    .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 13px; font-weight: 500; color: #71717A; border-bottom: 2px solid transparent; cursor: pointer; }
    .tab.active { color: #A78BFA; border-bottom-color: #8B5CF6; }
    .content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 160px; }
    .thumbnail { width: 100%; aspect-ratio: 16/9; background: #27272A; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .play-icon { width: 40px; height: 40px; color: #52525B; }
    .section-label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: #71717A; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    textarea { width: 100%; background: #18181B; border: 1px solid #3F3F46; border-radius: 10px; padding: 12px; color: #fff; font-size: 14px; line-height: 1.5; resize: none; font-family: inherit; }
    textarea:focus { outline: none; border-color: #8B5CF6; }
    .hashtags-area { width: 100%; background: #18181B; border: 1px solid #3F3F46; border-radius: 10px; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .hashtag-chip { font-size: 12px; color: #A78BFA; background: #2E1065; padding: 3px 8px; border-radius: 999px; }
    .schedule-row { display: flex; align-items: center; gap: 8px; background: #18181B; border: 1px solid #3F3F46; border-radius: 10px; padding: 12px; }
    .schedule-icon { color: #71717A; }
    .schedule-text { font-size: 14px; color: #D4D4D8; flex: 1; }
    .change-link { font-size: 13px; color: #8B5CF6; }
    .film-next-box { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); border-radius: 12px; padding: 12px 16px; }
    .film-next-label { font-size: 11px; font-weight: 600; color: #A78BFA; margin-bottom: 4px; }
    .film-next-text { font-size: 13px; color: #D4D4D8; font-style: italic; }
    .sticky-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 390px; padding: 12px 16px 28px; background: rgba(9,9,11,0.95); backdrop-filter: blur(8px); border-top: 1px solid #27272A; display: flex; flex-direction: column; gap: 10px; }
    .btn-approve { width: 100%; padding: 16px; border-radius: 14px; background: #16A34A; border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-reject { width: 100%; padding: 14px; border-radius: 14px; background: #27272A; border: none; color: #A1A1AA; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <button class="back-btn">‹</button>
    <span class="header-title">Review Post</span>
    <span class="type-badge">Reel</span>
  </div>

  <!-- Platform Tabs -->
  <div class="tabs">
    <div class="tab active">IG</div>
    <div class="tab">TT</div>
    <div class="tab">X Thread</div>
    <div class="tab">X Video</div>
  </div>

  <!-- Scrollable Content -->
  <div class="content">
    <!-- Thumbnail -->
    <div class="thumbnail">
      <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
    </div>

    <!-- Caption -->
    <div>
      <div class="section-label">
        <span>Caption</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <textarea rows="4">Stop scrolling — this one CapCut trick saved me 3 hours a week. Most editors never find this button. Save this before you forget. 👇</textarea>
    </div>

    <!-- Hashtags -->
    <div>
      <div class="section-label">
        <span>Hashtags</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <div class="hashtags-area">
        <span class="hashtag-chip">#capcut</span>
        <span class="hashtag-chip">#videoediting</span>
        <span class="hashtag-chip">#editingtips</span>
        <span class="hashtag-chip">#contentcreator</span>
        <span class="hashtag-chip">#reels</span>
        <span class="hashtag-chip">#fyp</span>
        <span class="hashtag-chip">#viral</span>
        <span class="hashtag-chip">#videography</span>
      </div>
    </div>

    <!-- Schedule -->
    <div>
      <div class="section-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#71717A"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Post Time</span>
      </div>
      <div class="schedule-row">
        <span class="schedule-text">Today, 6:00 PM</span>
        <span class="change-link">Change</span>
      </div>
    </div>

    <!-- Film Next -->
    <div class="film-next-box">
      <div class="film-next-label">💡 Film next</div>
      <div class="film-next-text">A 60-second tutorial on the 3 most-rewatched CapCut transitions according to TikTok analytics.</div>
    </div>
  </div>

  <!-- Sticky Bottom CTAs -->
  <div class="sticky-bottom">
    <button class="btn-approve">✅ Approve</button>
    <button class="btn-reject">❌ Reject</button>
  </div>
</body>
</html>
