<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #09090B; color: #fff; min-height: 100vh; }
    .container { max-width: 560px; margin: 0 auto; padding: 32px 20px 40px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 32px; }
    .section { margin-bottom: 28px; }
    .section-title { font-size: 12px; font-weight: 600; color: #71717A; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .schedule-card { background: #18181B; border: 1px solid #27272A; border-radius: 14px; overflow: hidden; }
    .day-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #27272A; }
    .day-row:last-child { border-bottom: none; }
    .day-row.active { border-left: 2px solid #8B5CF6; padding-left: 14px; }
    .day-label { font-size: 14px; font-weight: 500; color: #D4D4D8; width: 36px; flex-shrink: 0; }
    .pill-group { display: flex; gap: 4px; flex: 1; }
    .pill { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
    .pill.selected { background: #7C3AED; color: #fff; }
    .pill.off-selected { background: #3F3F46; color: #D4D4D8; }
    .pill.inactive { background: #27272A; color: #71717A; }
    .time-select { background: #27272A; border: 1px solid #3F3F46; border-radius: 8px; padding: 5px 10px; font-size: 12px; color: #D4D4D8; }
    .save-btn { width: 100%; padding: 16px; background: #8B5CF6; border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .save-btn:hover { background: #7C3AED; }
    .drive-info { background: #18181B; border: 1px solid #27272A; border-radius: 12px; padding: 16px; }
    .drive-label { font-size: 12px; color: #71717A; margin-bottom: 6px; }
    .drive-id { font-family: monospace; font-size: 13px; color: #52525B; background: #27272A; padding: 8px 12px; border-radius: 8px; word-break: break-all; }
    .drive-hint { font-size: 12px; color: #52525B; margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">Settings</h1>

    <!-- Schedule -->
    <div class="section">
      <div class="section-title">Posting Schedule</div>
      <div class="schedule-card">

        <div class="day-row">
          <span class="day-label">Sun</span>
          <div class="pill-group">
            <button class="pill inactive">Reel</button>
            <button class="pill inactive">Carousel</button>
            <button class="pill off-selected">Off</button>
          </div>
        </div>

        <div class="day-row active">
          <span class="day-label">Mon</span>
          <div class="pill-group">
            <button class="pill selected">Reel</button>
            <button class="pill inactive">Carousel</button>
            <button class="pill inactive">Off</button>
          </div>
          <select class="time-select"><option>6 PM</option><option>7 PM</option></select>
        </div>

        <div class="day-row">
          <span class="day-label">Tue</span>
          <div class="pill-group">
            <button class="pill inactive">Reel</button>
            <button class="pill inactive">Carousel</button>
            <button class="pill off-selected">Off</button>
          </div>
        </div>

        <div class="day-row active">
          <span class="day-label">Wed</span>
          <div class="pill-group">
            <button class="pill inactive">Reel</button>
            <button class="pill selected">Carousel</button>
            <button class="pill inactive">Off</button>
          </div>
          <select class="time-select"><option>6 PM</option><option>7 PM</option></select>
        </div>

        <div class="day-row">
          <span class="day-label">Thu</span>
          <div class="pill-group">
            <button class="pill inactive">Reel</button>
            <button class="pill inactive">Carousel</button>
            <button class="pill off-selected">Off</button>
          </div>
        </div>

        <div class="day-row active">
          <span class="day-label">Fri</span>
          <div class="pill-group">
            <button class="pill selected">Reel</button>
            <button class="pill inactive">Carousel</button>
            <button class="pill inactive">Off</button>
          </div>
          <select class="time-select"><option>6 PM</option><option>7 PM</option></select>
        </div>

        <div class="day-row">
          <span class="day-label">Sat</span>
          <div class="pill-group">
            <button class="pill inactive">Reel</button>
            <button class="pill inactive">Carousel</button>
            <button class="pill off-selected">Off</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Drive info -->
    <div class="section">
      <div class="section-title">Google Drive</div>
      <div class="drive-info">
        <div class="drive-label">Folder ID</div>
        <div class="drive-id">1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74y</div>
        <div class="drive-hint">Drop videos in /SocialMedia/Queue/reels/ to trigger the pipeline automatically.</div>
      </div>
    </div>

    <button class="save-btn">Save Changes</button>
  </div>
</body>
</html>
